# ============================================================
#  FAIRWAY FRIEND — Firebase App Hosting Config
#  This file tells App Hosting how to build and run the app.
# ============================================================

runConfig:
  runtime: nodejs20
  concurrency: 100
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10

env:
  - variable: NODE_ENV
    value: production
